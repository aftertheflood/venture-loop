<html>
<head>
<script src="https://d3js.org/d3.v5.min.js"></script>
<style>
body{
    color: white;
    background-color: black;
    font-family:sans-serif;
}
text{
    fill:#777;
}

.axis text{
    fill:#444;
    font-weight:bold;
    font-size:25px;
}

</style>
</head>
<body>
<h1>JOBS</h1>
<div class="viz"><svg></svg></div>
</body>

<script>
const width = 1000;
const height = 10000;
const margin = {top:0, left:150, bottom:0, right:10};

const dateScale = d3.scaleTime()
    .domain([new Date(2007, 0, 1), new Date(2018, 0, 1)])
    .range([margin.left, (width - (margin.left + margin.right))]);

const jobcats = [1,2,3,4,8,10,11,12,13,15,18,19,20,21,27,28,30,31,38,39,40,41,42,44,45,46,47];

const colors = d3.range(0, 1, 1/jobcats.length)
    .map(d=>d3.interpolateCool(d));

const colorScale = d3.scaleOrdinal()
    .range( colors )
    .domain( jobcats );


function dotPlots(data){
    d3.selectAll('.viz svg')
        .attr('width',width)
        .attr('height',height)
        .call((svg, dataSets)=>{
            const rowScale = d3.scaleLinear()
                .domain([0, dataSets.length])
                .range([0, height]);
            
            const barGap = rowScale(1) * 0.25;

            svg.append('g')
                .attr('class','axis')
                .selectAll('line')
                .data([2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018])
                .enter()
                .call(parent=>{
                    parent.append('line')
                        .attr('x1', d=>dateScale(new Date(d, 0, 1)))
                        .attr('x2', d=>dateScale(new Date(d, 0, 1)))
                        .attr('y1', 0)
                        .attr('y2', height)
                        .attr('stroke', '#777');
                    
                    parent.append('text')
                        .text(d=>d)
                        .attr('transform',d=>`translate(${dateScale(new Date(d, 0, 1))+3}, 20) rotate(90)`)
                })


            svg.selectAll('g.plot')
                .data(dataSets)
                .enter()
                .append('g')
                    .attr('class', 'plot')
                    .attr('transform', (d,i) => `translate(0, ${rowScale(i)})`)
                .each(function(data){
                    const group = d3.select(this);
                    group.append('text')
                        .text(data[0])
                        .attr('transform',`translate(0, ${-rowScale(1)/2})`);
                    group.selectAll('circle')
                        .data(data[1])
                        .enter()
                        .append('circle')
                            .attr('r', 2)
                            .attr('cx', d => dateScale(d['Posted Date']))
                            .attr('cy', d => Math.random() * (rowScale(1)-barGap))
                            .attr('fill', d =>colorScale(d['Job Category Id']))
                            .attr('fill-opacity', 0.5);

                });

        }, data);
}

</script>

<script>

function splitArrayOn(array, property){
    const splitted = array.reduce((dict, current) => {
        if(current == undefined) return dict;
        if(!dict[current[property]]){
            dict[current[property]] = [];
        }
        dict[current[property]].push(current);
        return dict;
    }, {});
    return splitted;
}

d3.tsv('/index-data/index-data.tsv',(row)=>{
    const locationelelments = row['Job Locations'].split(',')

    row['Posted Date'] = new Date(row['Posted Date']);
    row['Country'] = locationelelments[locationelelments.length-1];
    row['Archived Date'] = new Date(row['Archived Date'])
    row['Days Live'] = Math.floor((row['Archived Date'].getTime() - row['Posted Date'].getTime())/(1000*60*60*24));
    row['Month Posted'] = `${row['Posted Date'].getFullYear()}-${row['Posted Date'].getMonth()+1}`
    return row;
}).then((data)=>{
    dotPlots(
        Object.entries(splitArrayOn(data, 'Company Name'))
        .sort((b,a)=>{
            return a[1].length - b[1].length;
        })
        .filter((d,i)=>{
            return i<10;
        })
        )
});

// dotPlots(Object.entries({data}))
</script>
</html>
